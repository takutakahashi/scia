server:
  mode: "proxy"
  listen: ":8080"
  adminToken: "env:SCIA_ADMIN_TOKEN"
  approvalTimeout: "5m"
  mitm:
    caCertPath: "data/scia-ca.pem"
    caKeyPath: "data/scia-ca-key.pem"
  backendProxy:
    url: "env:SCIA_BACKEND_PROXY_URL"
  oauth:
    listen: "127.0.0.1:8081"
    redirectUrl: "http://localhost:8081/oauth/google/callback"
    integrations:
      google-calendar:
        name: "Google Calendar"
        iconUrl: "https://www.gstatic.com/images/branding/product/1x/calendar_2020q4_48dp.png"
        description: "Connect Google Calendar to read and update calendar events."
        released: true
        setup:
          callback_url: "http://localhost:8081/oauth/google/callback"
        scopes:
          - id: "calendar-write"
            value: "https://www.googleapis.com/auth/calendar"
            name: "Calendar read/write"
            desc: "Read, create, and update events."
            enabled: true
          - id: "calendar-read"
            value: "https://www.googleapis.com/auth/calendar.readonly"
            name: "Calendar read-only"
            desc: "Read events without writing changes."
            enabled: false
      notion-workspace:
        name: "Notion"
        iconUrl: "https://www.notion.so/images/favicon.ico"
        description: "Connect a Notion workspace."
        released: false
      todoist:
        name: "Todoist"
        iconUrl: "https://todoist.com/favicon.ico"
        description: "Connect Todoist tasks and projects."
      slack:
        name: "Slack"
        iconUrl: "https://a.slack-edge.com/80588/marketing/img/meta/favicon-32.png"
        description: "Connect Slack as a user."
        scopes:
          - id: "users-read"
            value: "users:read"
            name: "Read users"
            enabled: true
          - id: "chat-write"
            value: "chat:write"
            name: "Send messages"
            enabled: false
      github:
        name: "GitHub"
        iconUrl: "https://github.githubassets.com/favicons/favicon.png"
        description: "Connect GitHub as a user."
        scopes:
          - id: "read-user"
            value: "read:user"
            name: "Read user profile"
            enabled: true
          - id: "repo"
            value: "repo"
            name: "Repository access"
            enabled: false
    google:
      credentialId: google-calendar
      clientId: "env:GOOGLE_OAUTH_CLIENT_ID"
      clientSecret: "env:GOOGLE_OAUTH_CLIENT_SECRET"
      scope: "https://www.googleapis.com/auth/calendar"
    notion:
      credentialId: notion-workspace
      clientId: "env:NOTION_OAUTH_CLIENT_ID"
      clientSecret: "env:NOTION_OAUTH_CLIENT_SECRET"
      redirectUrl: "http://localhost:8081/oauth/notion/callback"
      notionVersion: "2026-03-11"
    todoist:
      credentialId: todoist
      clientId: "env:TODOIST_OAUTH_CLIENT_ID"
      clientSecret: "env:TODOIST_OAUTH_CLIENT_SECRET"
      scope: "data:read_write"
      redirectUrl: "http://localhost:8081/oauth/todoist/callback"
    slack:
      credentialId: slack
      clientId: "env:SLACK_OAUTH_CLIENT_ID"
      clientSecret: "env:SLACK_OAUTH_CLIENT_SECRET"
      scope: "users:read"
      redirectUrl: "http://localhost:8081/oauth/slack/callback"
    github:
      credentialId: github
      clientId: "env:GITHUB_OAUTH_CLIENT_ID"
      clientSecret: "env:GITHUB_OAUTH_CLIENT_SECRET"
      scope: "read:user"
      redirectUrl: "http://localhost:8081/oauth/github/callback"
  secrets:
    sqlitePath: "data/scia-secrets.db"

credentials:
  - id: github-token
    type: bearer
    value: "env:GITHUB_TOKEN"
  - id: api-key
    type: static-header
    header: X-API-Key
    value: "env:UPSTREAM_API_KEY"
  - id: shared-oauth-client
    type: oauth2-client-credentials
    params:
      token_url: "https://issuer.example.com/oauth/token"
      client_id: "env:OAUTH_CLIENT_ID"
      client_secret: "env:OAUTH_CLIENT_SECRET"
      scope: "read:items write:items"
  - id: google-calendar
    type: google-oauth-refresh-token
    params: {}
  - id: notion-workspace
    type: notion-oauth-refresh-token
    params: {}
  - id: todoist
    type: todoist-oauth-refresh-token
    params: {}
  - id: slack
    type: slack-user-oauth-token
    params: {}
  - id: github
    type: github-oauth-token
    params: {}

rules:
  - name: deny-dangerous-admin-api
    hosts: ["api.example.com"]
    methods: ["DELETE"]
    paths: ["/admin/*"]
    action: deny
  - name: approve-writes
    hosts: ["api.example.com"]
    methods: ["POST", "PUT", "PATCH"]
    paths: ["/v1/*"]
    action: approval
    credentials: ["shared-oauth-client"]
    approvalNote: "Write access to api.example.com requires operator approval."
  - name: inject-read-token
    hosts: ["api.example.com"]
    methods: ["GET"]
    paths: ["/v1/*"]
    action: allow
    credentials: ["github-token"]
  - name: inject-google-calendar-token
    hosts: ["www.googleapis.com"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths: ["/calendar/v3/*"]
    action: allow
    credentials: ["google-calendar"]
  - name: inject-notion-token
    hosts: ["api.notion.com"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths: ["/v1/*"]
    action: allow
    credentials: ["notion-workspace"]
  - name: inject-todoist-token
    hosts: ["api.todoist.com"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths: ["/api/v1/*"]
    action: allow
    credentials: ["todoist"]
  - name: inject-slack-user-token
    hosts: ["slack.com"]
    methods: ["GET", "POST"]
    paths: ["/api/*"]
    action: allow
    credentials: ["slack"]
  - name: inject-github-user-token
    hosts: ["api.github.com"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths: ["/*"]
    action: allow
    credentials: ["github"]
