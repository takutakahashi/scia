server:
  mode: "proxy"
  listen: ":8080"
  adminToken: "env:SCIA_ADMIN_TOKEN"
  approvalTimeout: "5m"
  mitm:
    caCertPath: "data/scia-ca.pem"
    caKeyPath: "data/scia-ca-key.pem"
  backendProxy:
    url: "env:SCIA_BACKEND_PROXY_URL"
  authSync:
    url: "env:SCIA_AUTH_SYNC_URL"
    proxyId: "proxy-dev"
    token: "env:SCIA_AUTH_SYNC_TOKEN"
  oauth:
    listen: "127.0.0.1:8081"
    redirectUrl: "http://localhost:8081/oauth/google/callback"
    google:
      credentialId: google-calendar
      clientId: "env:GOOGLE_OAUTH_CLIENT_ID"
      clientSecret: "env:GOOGLE_OAUTH_CLIENT_SECRET"
      scope: "https://www.googleapis.com/auth/calendar"
    namespaces:
      service-a:
        google:
          clientIdSecretRef: "secret:service-a.google.client-id"
          clientSecretRef: "secret:service-a.google.client-secret"
          scope: "https://www.googleapis.com/auth/calendar"
          redirectUrl: "http://localhost:8081/oauth/google/callback"
      service-b:
        google:
          clientIdSecretRef: "env:SERVICE_B_GOOGLE_CLIENT_ID"
          clientSecretRef: "env:SERVICE_B_GOOGLE_CLIENT_SECRET"
          scope: "openid email profile"
  secrets:
    sqlitePath: "data/scia-secrets.db"

credentials:
  - id: github-token
    type: bearer
    value: "env:GITHUB_TOKEN"
  - id: api-key
    type: static-header
    header: X-API-Key
    value: "env:UPSTREAM_API_KEY"
  - id: shared-oauth-client
    type: oauth2-client-credentials
    params:
      token_url: "https://issuer.example.com/oauth/token"
      client_id: "env:OAUTH_CLIENT_ID"
      client_secret: "env:OAUTH_CLIENT_SECRET"
      scope: "read:items write:items"
  - id: google-calendar
    type: google-oauth-refresh-token
    params: {}

rules:
  - name: deny-dangerous-admin-api
    hosts: ["api.example.com"]
    methods: ["DELETE"]
    paths: ["/admin/*"]
    action: deny
  - name: approve-writes
    hosts: ["api.example.com"]
    methods: ["POST", "PUT", "PATCH"]
    paths: ["/v1/*"]
    action: approval
    credentials: ["shared-oauth-client"]
    approvalNote: "Write access to api.example.com requires operator approval."
  - name: inject-read-token
    hosts: ["api.example.com"]
    methods: ["GET"]
    paths: ["/v1/*"]
    action: allow
    credentials: ["github-token"]
  - name: inject-google-calendar-token
    hosts: ["www.googleapis.com"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths: ["/calendar/v3/*"]
    action: allow
    credentials: ["google-calendar"]
  - name: inject-service-a-google-token
    hosts: ["www.googleapis.com"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths: ["/calendar/v3/*"]
    action: allow
    credentials: ["service-a.google"]
