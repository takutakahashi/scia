server:
  listen: ":8080"
  adminToken: "env:SCIA_ADMIN_TOKEN"
  approvalTimeout: "5m"
  mitm:
    caCertPath: "data/scia-ca.pem"
    caKeyPath: "data/scia-ca-key.pem"
  backendProxy:
    url: "env:SCIA_BACKEND_PROXY_URL"
  oauth:
    listen: "127.0.0.1:8081"
    redirectUrl: "http://localhost:8081/oauth/google/callback"

credentials:
  - id: github-token
    type: bearer
    value: "env:GITHUB_TOKEN"
  - id: api-key
    type: static-header
    header: X-API-Key
    value: "env:UPSTREAM_API_KEY"
  - id: shared-oauth-client
    type: oauth2-client-credentials
    params:
      token_url: "https://issuer.example.com/oauth/token"
      client_id: "env:OAUTH_CLIENT_ID"
      client_secret: "env:OAUTH_CLIENT_SECRET"
      scope: "read:items write:items"
  - id: google-calendar
    type: google-oauth-refresh-token
    params:
      client_id: "env:GOOGLE_OAUTH_CLIENT_ID"
      client_secret: "env:GOOGLE_OAUTH_CLIENT_SECRET"
      refresh_token: "env:GOOGLE_OAUTH_REFRESH_TOKEN"
      scope: "https://www.googleapis.com/auth/calendar"

rules:
  - name: deny-dangerous-admin-api
    hosts: ["api.example.com"]
    methods: ["DELETE"]
    paths: ["/admin/*"]
    action: deny
  - name: approve-writes
    hosts: ["api.example.com"]
    methods: ["POST", "PUT", "PATCH"]
    paths: ["/v1/*"]
    action: approval
    credentials: ["shared-oauth-client"]
    approvalNote: "Write access to api.example.com requires operator approval."
  - name: inject-read-token
    hosts: ["api.example.com"]
    methods: ["GET"]
    paths: ["/v1/*"]
    action: allow
    credentials: ["github-token"]
  - name: inject-google-calendar-token
    hosts: ["www.googleapis.com"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths: ["/calendar/v3/*"]
    action: allow
    credentials: ["google-calendar"]
